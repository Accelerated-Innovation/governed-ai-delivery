name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: pip install -e ".[test]"

      - name: Run pytest
        run: pytest

      - name: Self-doctor smoke test (apply + doctor on a fresh tmp dir)
        # PR 4: confirms the apply → doctor flow works end-to-end against a
        # real bundled install (not just unit fixtures). Catches regressions
        # where unit tests pass but the CLI surface broke.
        #
        # Note: doctor is allowed to report warnings against the bundled
        # baseline (e.g. D007 flags known LLM-content leakage in TECH_STACK
        # that PR 6c will resolve). The smoke test asserts only that doctor
        # runs without crashing — exit code 0 or 1 is acceptable; any other
        # code is a real failure.
        run: |
          set -uxo pipefail
          tmp="$(mktemp -d)"
          govkit apply --agent claude-code --target "$tmp" \
                       --level 4 --type api --ci github --stack python-fastapi
          # Stub the hexagonal folders so D001 (rule-glob check) has matching
          # paths to resolve against — these rules assume an existing src/ layout.
          mkdir -p "$tmp"/src/{api,ports,adapters,services,security,auth}
          touch "$tmp"/src/api/.gitkeep "$tmp"/src/ports/.gitkeep \
                "$tmp"/src/adapters/.gitkeep "$tmp"/src/services/.gitkeep \
                "$tmp"/src/security/.gitkeep "$tmp"/src/auth/.gitkeep
          # Run doctor — accept exit 0 (clean) or 1 (warnings/baseline issues).
          # Exit codes >1 (e.g. 2 for argparse failure, 130 for SIGINT) fail.
          govkit doctor --target "$tmp" || rc=$?
          rc="${rc:-0}"
          if [ "$rc" -gt 1 ]; then exit "$rc"; fi
          # Stack swap exercises the overlay loader path.
          govkit stack apply dotnet-aspnet --target "$tmp"
          govkit doctor --target "$tmp" || rc=$?
          rc="${rc:-0}"
          if [ "$rc" -gt 1 ]; then exit "$rc"; fi

  wheel-smoke:
    # PR 7 / A12: build a real wheel and install it into a clean venv. The
    # pytest job uses `pip install -e .` which resolves AGENTS_DIR / STACKS_DIR
    # against the source tree; the wheel path can have entirely different
    # asset bundling (e.g. a missing force-include for cli/stacks/). This job
    # catches packaging regressions that editable installs hide.
    runs-on: ubuntu-latest
    needs: pytest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tooling
        run: pip install build

      - name: Build wheel
        run: python -m build --wheel

      - name: Install wheel into a clean venv
        run: |
          set -euxo pipefail
          python -m venv /tmp/wheel-smoke-venv
          /tmp/wheel-smoke-venv/bin/pip install --upgrade pip
          /tmp/wheel-smoke-venv/bin/pip install dist/govkit-*.whl

      - name: Stack list resolves from wheel layout
        # `govkit stack list` reads cli/stacks/*/overlay.yaml — if hatch
        # didn't bundle the YAML+MD data files, this returns no stacks
        # (or crashes) inside the clean venv even though it works in dev.
        run: |
          set -euxo pipefail
          out="$(/tmp/wheel-smoke-venv/bin/govkit stack list)"
          echo "$out"
          for expected in python-fastapi dotnet-aspnet java-spring-boot nodejs-fastify go-gin python-dbt; do
            echo "$out" | grep -q "$expected" || { echo "MISSING: $expected"; exit 1; }
          done

      - name: Apply against a fresh tmp dir from the wheel install
        # End-to-end: the wheel-installed `govkit apply` writes the marker,
        # the stack overlay docs, the editable header, and the skill_context.
        # Catches the case where docs/ assets are absent in the wheel.
        run: |
          set -euxo pipefail
          tmp="$(mktemp -d)"
          /tmp/wheel-smoke-venv/bin/govkit apply --agent claude-code \
              --target "$tmp" --level 4 --type api --ci github \
              --stack dotnet-aspnet
          test -f "$tmp/.govkit/marker.json"
          test -f "$tmp/.govkit/skill_context.yaml"
          test -f "$tmp/docs/backend/architecture/TECH_STACK.md"
          test -f "$tmp/GOVKIT_SETUP_REVIEW.md"
          grep -q "baseline: dotnet-aspnet@" "$tmp/docs/backend/architecture/TECH_STACK.md"

      - name: Apply --type data against a fresh tmp dir from the wheel install
        # The data install pulls from four distinct wheel locations
        # (cli/stacks/python-dbt/, cli/docs/data/architecture/,
        # cli/agents/claude-code/rules/data/, cli/agents/claude-code/claude-md/).
        # `stack list` only proves overlay.yaml shipped; this step proves the
        # rest of the data assets shipped too — a future packaging change that
        # silently drops any of these dirs fails here, not in production.
        run: |
          set -euxo pipefail
          tmp="$(mktemp -d)"
          /tmp/wheel-smoke-venv/bin/govkit apply --agent claude-code \
              --target "$tmp" --level 4 --type data --ci github \
              --stack python-dbt
          test -f "$tmp/.govkit/marker.json"
          test -f "$tmp/.govkit/skill_context.yaml"
          test -f "$tmp/.claude/rules/govkit/governance.md"        # claude-md/data.md
          test -f "$tmp/.claude/rules/govkit/staging.md"           # rules/data/
          test -f "$tmp/docs/data/architecture/BOUNDARIES.md"       # baseline contracts
          test -f "$tmp/docs/data/architecture/TECH_STACK.md"       # python-dbt overlay
          grep -q "baseline: python-dbt@" "$tmp/docs/data/architecture/TECH_STACK.md"
