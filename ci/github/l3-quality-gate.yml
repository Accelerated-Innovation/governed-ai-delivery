# l3-quality-gate.yml
#
# PURPOSE: Level 3 (Governed AI Delivery — Foundations) quality gate.
# Codebase-wide checks; no per-feature artifact validation.
# Copy this file to .github/workflows/quality-gate.yml.
#
# JOBS:
#   commit-format     — validates commit message format
#   boundary-check    — enforces hexagonal architecture boundaries via import-linter
#                       (requires .importlinter config in your repo root)
#   sonarqube         — SonarQube quality gate (optional, requires SONAR_TOKEN)
#   security-scan     — Snyk vulnerability scan (optional, requires SNYK_TOKEN)
#
# NOTE: This is the Level 3 (Foundations) gate. It does NOT include
# per-feature governance checks because L3 has no `features/` directory model.
# Layered checks introduced at higher levels:
#
#   Level 4 (Spec-Driven Add-On) adds:
#     - eval_criteria.yaml schema validation
#     - Evaluation prediction thresholds (FIRST + 7 Virtues)
#     - Contract compatibility checks
#     - Per-feature artifact existence checks
#
#   Level 5 (GenAI Operations) adds:
#     - DeepEval, Promptfoo, RAGAS gates
#     - Guardrails configuration check
#     - Multi-agent topology gate
#
# REQUIRED SECRETS (optional — remove jobs you don't use):
#   SONAR_TOKEN, SONAR_HOST_URL — only if using the sonarqube job
#   SNYK_TOKEN                  — only if using the security-scan job

name: Quality Gate (L3 Foundations)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  commit-format:
    name: Commit message format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commit messages
        run: |
          COMMITS=$(git log --format="%s" origin/main..HEAD 2>/dev/null || true)
          if [ -z "$COMMITS" ]; then
            echo "No new commits to check."
            exit 0
          fi
          errors=0
          while IFS= read -r msg; do
            if ! echo "$msg" | grep -qE "^(feat|fix|docs|test|refactor|chore)(\(.*\))?: .+"; then
              echo "FAIL: '$msg'"
              errors=$((errors + 1))
            fi
          done <<< "$COMMITS"
          if [ "$errors" -gt 0 ]; then
            echo ""
            echo "$errors commit(s) do not match format: type(scope): description"
            echo "Allowed types: feat, fix, docs, test, refactor, chore"
            exit 1
          fi
          echo "All commit messages match expected format."

  boundary-check:
    name: Architecture boundary enforcement
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install import-linter
        run: pip install import-linter

      - name: Run boundary checks
        run: lint-imports

  sonarqube:
    name: SonarQube quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube quality gate check
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  security-scan:
    name: Security vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Snyk
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
