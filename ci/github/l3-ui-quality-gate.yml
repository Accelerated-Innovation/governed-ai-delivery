# l3-ui-quality-gate.yml
#
# PURPOSE: Level 3 (Governed AI Delivery — Foundations) quality gate for UI shapes.
# Codebase-wide checks; no per-feature artifact validation.
# Copy this file to .github/workflows/quality-gate.yml.
#
# JOBS:
#   commit-format     — validates commit message format
#   lint              — ESLint (including accessibility plugin: jsx-a11y for React,
#                       @angular-eslint/template/accessibility-* for Angular)
#   unit-tests        — Vitest / Jest (component + hook tests, FIRST compliant)
#   build-smoke       — confirms `npm run build` produces a deployable artifact
#   security-scan     — Snyk npm scan (optional, requires SNYK_TOKEN)
#
# NOTE: This is the Level 3 (Foundations) gate for UI shapes (--type ui-react /
# ui-angular). It does NOT include per-feature governance checks because L3 has
# no `features/` directory model. Layered checks introduced at higher levels:
#
#   Level 4 (Spec-Driven Add-On) adds:
#     - ui-quality-gate.yml (type-check, schema validation, bundle size budget)
#     - ui-eval-gate.yml (FIRST/Virtue prediction, Playwright E2E, axe scans)
#
#   Level 5 (GenAI Operations) adds:
#     - DeepEval/Promptfoo/RAGAS gates (for UI features that consume LLM-backed endpoints)
#     - Guardrails configuration check
#     - Multi-agent topology gate
#
# REQUIRED SECRETS (optional — remove jobs you don't use):
#   SNYK_TOKEN — only if using the security-scan job

name: UI Quality Gate (L3 Foundations)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  commit-format:
    name: Commit message format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commit messages
        run: |
          COMMITS=$(git log --format="%s" origin/main..HEAD 2>/dev/null || true)
          if [ -z "$COMMITS" ]; then
            echo "No new commits to check."
            exit 0
          fi
          errors=0
          while IFS= read -r msg; do
            if ! echo "$msg" | grep -qE "^(feat|fix|docs|test|refactor|chore)(\(.*\))?: .+"; then
              echo "FAIL: '$msg'"
              errors=$((errors + 1))
            fi
          done <<< "$COMMITS"
          if [ "$errors" -gt 0 ]; then
            echo ""
            echo "$errors commit(s) do not match format: type(scope): description"
            echo "Allowed types: feat, fix, docs, test, refactor, chore"
            exit 1
          fi
          echo "All commit messages match expected format."

  lint:
    name: ESLint (including accessibility plugin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint .

  unit-tests:
    name: Component and hook unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Configure this step to your test runner — Vitest, Jest, or Karma+Jasmine.
      - name: Run unit tests
        run: npm test -- --run

  build-smoke:
    name: Production build smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  security-scan:
    name: Security vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Snyk
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
