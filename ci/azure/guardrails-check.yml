# Azure DevOps pipeline — Level 5 Guardrails configuration validation.
#
# JOBS:
#   Guardrails — validates NeMo Colang files and Guardrails AI guard definitions
#
# NO VARIABLES REQUIRED — structural validation only.

trigger: none

pr:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: GuardrailsCheck
    displayName: Guardrails configuration validation
    jobs:
      - job: GuardrailsCheck
        displayName: Validate guardrails configuration
        steps:
          - checkout: self

          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.11'

          - script: |
              HAS_NEMO="false"
              HAS_GRAI="false"
              if [ -d "adapters/guardrails/nemo" ] || find . -name "*.co" -path "*/rails/*" 2>/dev/null | grep -q .; then
                HAS_NEMO="true"
              fi
              if [ -d "adapters/guardrails/validators" ] || find . -name "*guard*.py" -path "*/guardrails/*" 2>/dev/null | grep -q .; then
                HAS_GRAI="true"
              fi
              echo "##vso[task.setvariable variable=HAS_NEMO]$HAS_NEMO"
              echo "##vso[task.setvariable variable=HAS_GRAI]$HAS_GRAI"
            displayName: Detect guardrails configuration

          - script: |
              pip install nemoguardrails
              errors=0
              for config_dir in $(find . -name "config.yml" -path "*/nemo/*" -exec dirname {} \;); do
                echo "Validating $config_dir..."
                python -c "
              from nemoguardrails import RailsConfig
              try:
                  config = RailsConfig.from_path('$config_dir')
                  print('  PASS')
              except Exception as e:
                  print(f'  FAIL: {e}')
                  exit(1)
              " || errors=$((errors + 1))
              done
              [ "$errors" -gt 0 ] && exit 1
            displayName: Validate NeMo Colang files
            condition: eq(variables['HAS_NEMO'], 'true')

          - script: |
              pip install guardrails-ai
              errors=0
              for guard_file in $(find . -name "*guard*.py" -path "*/guardrails/validators/*"); do
                echo "Checking $guard_file..."
                python -c "import ast; ast.parse(open('$guard_file').read())" || errors=$((errors + 1))
              done
              [ "$errors" -gt 0 ] && exit 1
              echo "All guardrails configurations valid."
            displayName: Validate Guardrails AI guards
            condition: eq(variables['HAS_GRAI'], 'true')
