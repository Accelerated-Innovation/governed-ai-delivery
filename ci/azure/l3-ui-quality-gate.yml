# Azure DevOps pipeline — Level 3 (Governed AI Delivery — Foundations) quality gate for UI shapes.
# Codebase-wide checks; no per-feature artifact validation.
#
# STAGES:
#   CommitFormat     — validates commit message format
#   Lint             — ESLint (including accessibility plugin: jsx-a11y for React,
#                      @angular-eslint/template/accessibility-* for Angular)
#   UnitTests        — Vitest / Jest (component + hook tests, FIRST compliant)
#   BuildSmoke       — confirms `npm run build` produces a deployable artifact
#   SecurityScan     — Snyk npm vulnerability scan (optional, requires SNYK_TOKEN)
#
# NOTE: This is the Level 3 (Foundations) gate for UI shapes (--type ui-react /
# ui-angular). It does NOT include per-feature governance checks because L3 has
# no `features/` directory model. Layered checks introduced at higher levels:
#
#   Level 4 (Spec-Driven Add-On) adds:
#     - ui-quality-gate (type-check, schema validation, bundle size budget)
#     - ui-eval-gate (FIRST/Virtue prediction, Playwright E2E, axe scans)
#
#   Level 5 (GenAI Operations) adds:
#     - DeepEval/Promptfoo/RAGAS gates (for UI features that consume LLM-backed endpoints)
#     - Guardrails configuration check
#     - Multi-agent topology gate

trigger: none

pr:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: CommitFormat
    displayName: Commit message format
    dependsOn: []
    jobs:
      - job: CommitFormat
        displayName: Validate commit messages
        steps:
          - checkout: self
            fetchDepth: 0

          - script: |
              COMMITS=$(git log --format="%s" origin/main..HEAD 2>/dev/null || true)
              if [ -z "$COMMITS" ]; then
                echo "No new commits to check."
                exit 0
              fi
              errors=0
              while IFS= read -r msg; do
                if ! echo "$msg" | grep -qE "^(feat|fix|docs|test|refactor|chore)(\(.*\))?: .+"; then
                  echo "FAIL: '$msg'"
                  errors=$((errors + 1))
                fi
              done <<< "$COMMITS"
              if [ "$errors" -gt 0 ]; then
                echo ""
                echo "$errors commit(s) do not match format: type(scope): description"
                echo "Allowed types: feat, fix, docs, test, refactor, chore"
                exit 1
              fi
              echo "All commit messages match expected format."
            displayName: Validate commit message format

  - stage: Lint
    displayName: ESLint (with accessibility plugin)
    dependsOn: []
    jobs:
      - job: Lint
        displayName: Run ESLint
        steps:
          - checkout: self

          - task: NodeTool@0
            inputs:
              versionSpec: '20.x'
            displayName: Install Node.js

          - script: |
              npm ci
              npx eslint .
            displayName: Install deps and lint

  - stage: UnitTests
    displayName: Component and hook unit tests
    dependsOn: []
    jobs:
      - job: UnitTests
        displayName: Run unit tests
        steps:
          - checkout: self

          - task: NodeTool@0
            inputs:
              versionSpec: '20.x'
            displayName: Install Node.js

          # Configure this step to your test runner — Vitest, Jest, or Karma+Jasmine.
          - script: |
              npm ci
              npm test -- --run
            displayName: Install deps and run unit tests

  - stage: BuildSmoke
    displayName: Production build smoke
    dependsOn: []
    jobs:
      - job: BuildSmoke
        displayName: npm run build
        steps:
          - checkout: self

          - task: NodeTool@0
            inputs:
              versionSpec: '20.x'
            displayName: Install Node.js

          - script: |
              npm ci
              npm run build
            displayName: Install deps and build

  - stage: SecurityScan
    displayName: Security vulnerability scan
    dependsOn: []
    jobs:
      - job: SecurityScan
        displayName: Snyk npm scan
        steps:
          - checkout: self

          - script: |
              npm install -g snyk
              snyk auth $(SNYK_TOKEN)
              snyk test --severity-threshold=high
            displayName: Run Snyk security scan
