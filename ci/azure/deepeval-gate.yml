# Azure DevOps pipeline — Level 5 DeepEval LLM quality evaluation.
#
# JOBS:
#   DeepEval — detects features with deepeval_* eval_class, runs test suite
#
# REQUIRED VARIABLES:
#   OPENAI_API_KEY or ANTHROPIC_API_KEY

trigger: none

pr:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: DeepEval
    displayName: DeepEval LLM quality evaluation
    jobs:
      - job: DeepEval
        displayName: Run DeepEval test suites
        steps:
          - checkout: self

          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.11'

          - script: |
              FEATURES=$(grep -rl "deepeval_" features/ --include="eval_criteria.yaml" \
                | xargs -I{} dirname {} | sort -u | tr '\n' ',' || true)
              echo "##vso[task.setvariable variable=FEATURES]$FEATURES"
              if [ -z "$FEATURES" ]; then
                echo "No features with DeepEval criteria found."
              fi
            displayName: Detect features with DeepEval criteria

          - script: |
              pip install deepeval pytest
              pip install -r requirements.txt 2>/dev/null || true
            displayName: Install dependencies
            condition: ne(variables['FEATURES'], '')

          - script: |
              errors=0
              for feature_dir in $(echo "$(FEATURES)" | tr ',' '\n'); do
                [ -z "$feature_dir" ] && continue
                feature=$(basename "$feature_dir")
                test_dir="tests/eval/$feature"
                if [ -d "$test_dir" ]; then
                  echo "Running DeepEval for $feature..."
                  deepeval test run "$test_dir/" || errors=$((errors + 1))
                fi
              done
              if [ "$errors" -gt 0 ]; then
                exit 1
              fi
            displayName: Run DeepEval test suites
            condition: ne(variables['FEATURES'], '')
            env:
              OPENAI_API_KEY: $(OPENAI_API_KEY)
