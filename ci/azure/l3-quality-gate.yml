# Azure DevOps pipeline — Level 3 (Spec-Driven Development) quality gate.
# Enforces spec compliance and basic quality on every PR.
#
# JOBS:
#   governance-artifacts   — checks that required L3 governance artifacts exist (3 per feature)
#   commit-format          — validates commit message format
#   sonarqube              — SonarQube quality gate (optional, requires SONAR_TOKEN)
#   security-scan          — Snyk vulnerability scan (optional, requires SNYK_TOKEN)
#
# NOTE: This is the Level 3 gate. It does NOT include:
#   - eval_criteria.yaml schema validation (Level 4)
#   - Architecture boundary enforcement via import-linter (Level 4)
#   - Evaluation prediction checks (Level 4)
#   - Contract compatibility checks (Level 4)

trigger: none

pr:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: GovernanceArtifacts
    displayName: Governance artifact checks (L3)
    jobs:
      - job: GovernanceArtifacts
        displayName: Check L3 governance artifacts exist
        steps:
          - checkout: self

          - script: |
              errors=0
              for feature_dir in features/*/; do
                [ -d "$feature_dir" ] || continue
                feature=$(basename "$feature_dir")
                case "$feature" in starter_*) continue;; esac

                for artifact in acceptance.feature nfrs.md plan.md; do
                  if [ ! -f "$feature_dir/$artifact" ]; then
                    echo "FAIL: $feature missing $artifact"
                    errors=$((errors + 1))
                  fi
                done
              done
              if [ "$errors" -gt 0 ]; then
                echo "$errors missing artifact(s)"
                exit 1
              fi
              echo "All features have required L3 artifacts."
            displayName: Check required artifacts

  - stage: CommitFormat
    displayName: Commit message format
    dependsOn: []
    jobs:
      - job: CommitFormat
        displayName: Validate commit messages
        steps:
          - checkout: self
            fetchDepth: 0

          - script: |
              COMMITS=$(git log --format="%s" origin/main..HEAD 2>/dev/null || true)
              if [ -z "$COMMITS" ]; then
                echo "No new commits to check."
                exit 0
              fi
              errors=0
              while IFS= read -r msg; do
                if ! echo "$msg" | grep -qE "^(feat|fix|docs|test|refactor|chore)(\(.*\))?: .+"; then
                  echo "FAIL: '$msg'"
                  errors=$((errors + 1))
                fi
              done <<< "$COMMITS"
              if [ "$errors" -gt 0 ]; then
                echo ""
                echo "$errors commit(s) do not match format: type(scope): description"
                echo "Allowed types: feat, fix, docs, test, refactor, chore"
                exit 1
              fi
              echo "All commit messages match expected format."
            displayName: Validate commit message format

  - stage: SonarQube
    displayName: SonarQube quality gate
    dependsOn: []
    jobs:
      - job: SonarQube
        displayName: SonarQube quality gate
        steps:
          - checkout: self
            fetchDepth: 0

          - task: SonarQubeAnalyze@5
            displayName: SonarQube scan
            env:
              SONAR_TOKEN: $(SONAR_TOKEN)
              SONAR_HOST_URL: $(SONAR_HOST_URL)

  - stage: SecurityScan
    displayName: Security vulnerability scan
    dependsOn: []
    jobs:
      - job: SecurityScan
        displayName: Security vulnerability scan
        steps:
          - checkout: self

          - script: |
              npm install -g snyk
              snyk auth $(SNYK_TOKEN)
              snyk test --severity-threshold=high
            displayName: Run Snyk security scan
