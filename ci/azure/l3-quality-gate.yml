# Azure DevOps pipeline — Level 3 (Governed AI Delivery — Foundations) quality gate.
# Codebase-wide checks; no per-feature artifact validation.
#
# STAGES:
#   CommitFormat     — validates commit message format
#   BoundaryCheck    — enforces hexagonal architecture boundaries via import-linter
#                      (requires .importlinter config in your repo root)
#   SonarQube        — SonarQube quality gate (optional, requires SONAR_TOKEN)
#   SecurityScan    — Snyk vulnerability scan (optional, requires SNYK_TOKEN)
#
# NOTE: This is the Level 3 (Foundations) gate. It does NOT include
# per-feature governance checks because L3 has no `features/` directory model.
# Layered checks introduced at higher levels:
#
#   Level 4 (Spec-Driven Add-On) adds:
#     - eval_criteria.yaml schema validation
#     - Evaluation prediction thresholds (FIRST + 7 Virtues)
#     - Contract compatibility checks
#     - Per-feature artifact existence checks
#
#   Level 5 (GenAI Operations) adds:
#     - DeepEval, Promptfoo, RAGAS gates
#     - Guardrails configuration check
#     - Multi-agent topology gate

trigger: none

pr:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: CommitFormat
    displayName: Commit message format
    dependsOn: []
    jobs:
      - job: CommitFormat
        displayName: Validate commit messages
        steps:
          - checkout: self
            fetchDepth: 0

          - script: |
              COMMITS=$(git log --format="%s" origin/main..HEAD 2>/dev/null || true)
              if [ -z "$COMMITS" ]; then
                echo "No new commits to check."
                exit 0
              fi
              errors=0
              while IFS= read -r msg; do
                if ! echo "$msg" | grep -qE "^(feat|fix|docs|test|refactor|chore)(\(.*\))?: .+"; then
                  echo "FAIL: '$msg'"
                  errors=$((errors + 1))
                fi
              done <<< "$COMMITS"
              if [ "$errors" -gt 0 ]; then
                echo ""
                echo "$errors commit(s) do not match format: type(scope): description"
                echo "Allowed types: feat, fix, docs, test, refactor, chore"
                exit 1
              fi
              echo "All commit messages match expected format."
            displayName: Validate commit message format

  - stage: BoundaryCheck
    displayName: Architecture boundary enforcement
    dependsOn: []
    jobs:
      - job: BoundaryCheck
        displayName: Run import-linter
        steps:
          - checkout: self

          - script: |
              pip install import-linter
              lint-imports
            displayName: Enforce hexagonal architecture boundaries

  - stage: SonarQube
    displayName: SonarQube quality gate
    dependsOn: []
    jobs:
      - job: SonarQube
        displayName: SonarQube quality gate
        steps:
          - checkout: self
            fetchDepth: 0

          - task: SonarQubeAnalyze@5
            displayName: SonarQube scan
            env:
              SONAR_TOKEN: $(SONAR_TOKEN)
              SONAR_HOST_URL: $(SONAR_HOST_URL)

  - stage: SecurityScan
    displayName: Security vulnerability scan
    dependsOn: []
    jobs:
      - job: SecurityScan
        displayName: Security vulnerability scan
        steps:
          - checkout: self

          - script: |
              npm install -g snyk
              snyk auth $(SNYK_TOKEN)
              snyk test --severity-threshold=high
            displayName: Run Snyk security scan
