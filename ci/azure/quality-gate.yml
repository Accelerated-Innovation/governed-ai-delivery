# Azure DevOps pipeline — Enforces structural and security quality on every PR.
# Validate with your Azure DevOps admin before use.
#
# JOBS:
#   schema-validation      — validates backend features/*/eval_criteria.yaml against
#                            governance/backend/schemas/eval_criteria.schema.json
#   boundary-check         — enforces hexagonal architecture boundaries via import-linter
#   sonarqube              — SonarQube quality gate (requires SONAR_TOKEN and SONAR_HOST_URL variables)
#   security-scan          — Snyk vulnerability scan (requires SNYK_TOKEN variable)
#   contract-compatibility — detects @contract-tagged features and checks backward compatibility
#   governance-artifacts   — checks that required governance artifacts exist for each feature
#   commit-format          — validates commit message format matches project conventions
#
# REQUIRED VARIABLES (link a variable group): SONAR_TOKEN, SONAR_HOST_URL, SNYK_TOKEN

trigger: none

pr:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: SchemaValidation
    displayName: Validate eval_criteria.yaml files
    jobs:
      - job: SchemaValidation
        displayName: Validate eval_criteria.yaml files
        steps:
          - checkout: self

          - script: pip install check-jsonschema
            displayName: Install check-jsonschema

          - script: |
              find features -name "eval_criteria.yaml" | while read file; do
                echo "Validating $file"
                check-jsonschema --schemafile governance/backend/schemas/eval_criteria.schema.json "$file"
              done
            displayName: Validate all eval_criteria.yaml instances

  - stage: BoundaryCheck
    displayName: Architecture boundary enforcement
    dependsOn: []
    jobs:
      - job: BoundaryCheck
        displayName: Architecture boundary enforcement
        steps:
          - checkout: self

          - script: pip install import-linter
            displayName: Install import-linter

          - script: lint-imports
            displayName: Run boundary checks

  - stage: SonarQube
    displayName: SonarQube quality gate
    dependsOn: []
    jobs:
      - job: SonarQube
        displayName: SonarQube quality gate
        steps:
          - checkout: self
            fetchDepth: 0

          - task: SonarQubeAnalyze@5
            displayName: SonarQube scan
            env:
              SONAR_TOKEN: $(SONAR_TOKEN)
              SONAR_HOST_URL: $(SONAR_HOST_URL)

  - stage: SecurityScan
    displayName: Security vulnerability scan
    dependsOn: []
    jobs:
      - job: SecurityScan
        displayName: Security vulnerability scan
        steps:
          - checkout: self

          - script: |
              npm install -g snyk
              snyk auth $(SNYK_TOKEN)
              snyk test --severity-threshold=high
            displayName: Run Snyk security scan

  - stage: ContractCompatibility
    displayName: Contract compatibility check
    dependsOn: []
    jobs:
      - job: ContractCompatibility
        displayName: Contract compatibility check
        steps:
          - checkout: self
            fetchDepth: 0

          - script: |
              # Find features that have @contract-tagged scenarios
              CONTRACT_FEATURES=$(grep -rl "@contract" features/ --include="*.feature" \
                | xargs -I{} dirname {} | sort -u | tr '\n' ',')
              echo "##vso[task.setvariable variable=CONTRACT_FEATURES]$CONTRACT_FEATURES"
            displayName: Detect contract-producing features

          - script: |
              # Compare each contract schema against the base branch version.
              # Replace with your schema registry or file-based comparison tool.
              # Example using json-schema-diff-validator:
              #   pip install json-schema-diff-validator
              #   json-schema-diff-validator --base origin/main --head HEAD governance/backend/schemas/
              echo "Contract features detected: $(CONTRACT_FEATURES)"
              echo "Configure your backward-compatibility check here."
            displayName: Check contract schema backward compatibility
            condition: ne(variables['CONTRACT_FEATURES'], '')

  - stage: GovernanceArtifacts
    displayName: Governance artifact checks
    dependsOn: []
    jobs:
      - job: GovernanceArtifacts
        displayName: Check governance artifacts exist
        steps:
          - checkout: self

          - script: |
              errors=0
              for plan in features/*/plan.md; do
                [ -f "$plan" ] || continue
                feature_dir=$(dirname "$plan")
                feature=$(basename "$feature_dir")
                case "$feature" in starter_*) continue;; esac
                if [ ! -f "$feature_dir/architecture_preflight.md" ]; then
                  echo "FAIL: $feature has plan.md but no architecture_preflight.md"
                  errors=$((errors + 1))
                fi
              done
              if [ "$errors" -gt 0 ]; then
                echo "$errors feature(s) missing architecture_preflight.md"
                exit 1
              fi
              echo "All planned features have architecture preflight artifacts."
            displayName: Check architecture preflight exists

  - stage: CommitFormat
    displayName: Commit message format
    dependsOn: []
    jobs:
      - job: CommitFormat
        displayName: Validate commit messages
        steps:
          - checkout: self
            fetchDepth: 0

          - script: |
              COMMITS=$(git log --format="%s" origin/main..HEAD 2>/dev/null || true)
              if [ -z "$COMMITS" ]; then
                echo "No new commits to check."
                exit 0
              fi
              errors=0
              while IFS= read -r msg; do
                if ! echo "$msg" | grep -qE "^(feat|fix|docs|test|refactor|chore)(\(.*\))?: .+"; then
                  echo "FAIL: '$msg'"
                  errors=$((errors + 1))
                fi
              done <<< "$COMMITS"
              if [ "$errors" -gt 0 ]; then
                echo ""
                echo "$errors commit(s) do not match format: type(scope): description"
                echo "Allowed types: feat, fix, docs, test, refactor, chore"
                exit 1
              fi
              echo "All commit messages match expected format."
            displayName: Validate commit message format
