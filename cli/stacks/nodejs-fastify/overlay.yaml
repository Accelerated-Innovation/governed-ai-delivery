id: nodejs-fastify
version: "0.10.0"
display_name: "Node.js 20 LTS / TypeScript 5 / Fastify 4"
summary: "Fastify 4 + TypeScript 5 + Vitest + optional Cucumber-JS for L4 BDD"
default_assumptions:
  - id: stack.language
    value: typescript
  - id: stack.framework
    value: fastify
  - id: testing.unit
    value: vitest
  - id: testing.bdd
    value: cucumber-js
    review_required: true
docs:
  - src: TECH_STACK.md
    dest: docs/backend/architecture/TECH_STACK.md
    editable: true
  - src: API_CONVENTIONS.md
    dest: docs/backend/architecture/API_CONVENTIONS.md
    editable: true
  - src: TESTING.md
    dest: docs/backend/architecture/TESTING.md
    editable: true
  - src: LAYER_IMPLEMENTATION.md
    dest: docs/backend/architecture/LAYER_IMPLEMENTATION.md
    editable: true
  - src: SECURITY_AUTH_PATTERNS.md
    dest: docs/backend/architecture/SECURITY_AUTH_PATTERNS.md
    editable: true
  - src: OBSERVABILITY_PORT_CONTRACT.md
    dest: docs/backend/architecture/OBSERVABILITY_PORT_CONTRACT.md
    editable: true
skill_context:
  language: typescript
  api_framework: fastify
  unit_test: vitest
  bdd_test: cucumber-js
  package_files: ["package.json", "tsconfig.json", "pnpm-lock.yaml", "yarn.lock", "package-lock.json"]
  source_folder_hint: ["src/", "app/"]
review_checklist:
  - "Confirm Node.js version (20 LTS assumed) in TECH_STACK.md §1"
  - "Confirm Fastify vs Express, Koa, or Hono — change TECH_STACK.md §3 if different"
  - "Confirm Vitest vs Jest — TESTING.md assumes Vitest"
  - "Confirm Cucumber-JS for BDD if applicable; set BDD to 'none' if your team does not practise BDD"
