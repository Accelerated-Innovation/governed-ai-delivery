# yaml-language-server: $schema=../../../governance/schemas/stack-overlay.schema.json
id: python-fastapi
version: "0.10.0"
display_name: "Python 3.11+ / FastAPI"
summary: "FastAPI + pydantic + SQLAlchemy + pytest + pytest-bdd"
supported_types: [api, cli]
default_assumptions:
  - id: stack.language
    value: python
  - id: stack.framework
    value: fastapi
  - id: testing.unit
    value: pytest
  - id: testing.bdd
    value: pytest-bdd
    review_required: true
docs:
  - src: TECH_STACK.md
    dest: docs/backend/architecture/TECH_STACK.md
    editable: true
  - src: API_CONVENTIONS.md
    dest: docs/backend/architecture/API_CONVENTIONS.md
    editable: true
  - src: TESTING.md
    dest: docs/backend/architecture/TESTING.md
    editable: true
  - src: LAYER_IMPLEMENTATION.md
    dest: docs/backend/architecture/LAYER_IMPLEMENTATION.md
    editable: true
  - src: SECURITY_AUTH_PATTERNS.md
    dest: docs/backend/architecture/SECURITY_AUTH_PATTERNS.md
    editable: true
  - src: OBSERVABILITY_PORT_CONTRACT.md
    dest: docs/backend/architecture/OBSERVABILITY_PORT_CONTRACT.md
    editable: true
skill_context:
  language: python
  api_framework: fastapi
  unit_test: pytest
  bdd_test: pytest-bdd
  package_files: ["pyproject.toml", "requirements.txt", "requirements*.txt"]
  source_folder_hint: ["src/", "app/"]
review_checklist:
  - "Confirm Python version (3.11+ assumed) in TECH_STACK.md §1"
  - "Confirm FastAPI vs alternatives (Starlette, Flask, Django) — change TECH_STACK.md §3 if different"
  - "Confirm pytest-bdd is desired; set BDD to 'none' in TESTING.md and your .govkit options if your team does not practise BDD"
  - "Confirm hexagonal layer names (api/, services/, ports/, adapters/, common/) match your repo structure"
