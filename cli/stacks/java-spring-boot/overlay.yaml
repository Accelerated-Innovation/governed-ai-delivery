# yaml-language-server: $schema=../../../governance/schemas/stack-overlay.schema.json
id: java-spring-boot
version: "0.10.0"
display_name: "Java 21 / Spring Boot 3 / Spring Web MVC"
summary: "Spring Boot 3 + JUnit 5 + Mockito + optional Cucumber for L4 BDD"
supported_types: [api, cli]
default_assumptions:
  - id: stack.language
    value: java
  - id: stack.framework
    value: spring-boot
  - id: testing.unit
    value: junit5
  - id: testing.bdd
    value: cucumber
    review_required: true
docs:
  - src: TECH_STACK.md
    dest: docs/backend/architecture/TECH_STACK.md
    editable: true
  - src: API_CONVENTIONS.md
    dest: docs/backend/architecture/API_CONVENTIONS.md
    editable: true
  - src: TESTING.md
    dest: docs/backend/architecture/TESTING.md
    editable: true
  - src: LAYER_IMPLEMENTATION.md
    dest: docs/backend/architecture/LAYER_IMPLEMENTATION.md
    editable: true
  - src: SECURITY_AUTH_PATTERNS.md
    dest: docs/backend/architecture/SECURITY_AUTH_PATTERNS.md
    editable: true
  - src: OBSERVABILITY_PORT_CONTRACT.md
    dest: docs/backend/architecture/OBSERVABILITY_PORT_CONTRACT.md
    editable: true
skill_context:
  language: java
  api_framework: spring-boot
  unit_test: junit5
  bdd_test: cucumber
  package_files: ["pom.xml", "build.gradle", "build.gradle.kts"]
  source_folder_hint: ["src/main/java/", "src/main/kotlin/"]
review_checklist:
  - "Confirm Java version (21 LTS assumed) in TECH_STACK.md §1"
  - "Confirm Maven vs Gradle build system"
  - "Confirm JUnit 5 + Mockito + (optional) Cucumber in TESTING.md; set BDD to 'none' if your team does not practise BDD"
  - "Confirm Spring Web MVC vs Spring WebFlux (reactive) — API_CONVENTIONS.md assumes MVC"
