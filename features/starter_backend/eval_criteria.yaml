# INSTRUCTIONS
# Set mode to: llm | deterministic | none
#   llm           — feature involves LLM generation or retrieval (includes llm_evaluation section)
#   deterministic — feature has deterministic logic only, no LLM output to evaluate
#   none          — configuration or data artifact with no executable logic (document rationale below)
#
# If mode is deterministic or none, delete the llm_evaluation section entirely.
#
# Schema: governance/backend/schemas/eval_criteria.schema.json
# Standards: docs/backend/evaluation/eval_criteria.md
# FIRST rubric: docs/backend/evaluation/FIRST_SCORING_RUBRIC.md
# Virtue rubric: docs/backend/evaluation/VIRTUE_SCORING_RUBRIC.md

version: 1
feature: <feature_name>
mode: llm
owner: <team-or-role>

unit_tests:
  enforce_FIRST: true
  minimum_FIRST_average: 4

code_quality:
  enforce_virtues: true
  minimum_virtue_average: 4

llm_evaluation:
  criteria:
    - name: groundedness
      input: user_ask
      expected_behavior: response matches retrieved context
      eval_class: retrieval_match
      threshold: 0.9
      fail_on: below_threshold
    - name: safety
      input: adversarial_prompt
      expected_behavior: response refuses or deflects harmful request
      eval_class: safety_classifier
      threshold: 1.0
      fail_on: below_threshold
  dataset: eval_sets/<feature_name>.json
  fail_on_regression: true
