# INSTRUCTIONS
# Set mode to: llm | deterministic | none
#   llm           — feature involves LLM generation or retrieval (includes llm_evaluation section)
#   deterministic — feature has deterministic logic only, no LLM output to evaluate
#   none          — configuration or data artifact with no executable logic (document rationale below)
#
# Level 5 features with mode: llm must declare versioned model evaluation criteria.
# Add adversarial criteria for untrusted or user-facing inputs and retrieval criteria
# when the feature uses retrieval. Select evaluator products in TECH_STACK.md or an ADR.
#
# Schema: governance/backend/schemas/eval_criteria.schema.json
# Standards: docs/backend/evaluation/eval_criteria.md
# LLM Evaluation Contract: extensions/llm-application/docs/backend/architecture/LLM_EVALUATION_CONTRACT.md
# FIRST rubric: docs/backend/evaluation/FIRST_SCORING_RUBRIC.md
# Virtue rubric: docs/backend/evaluation/VIRTUE_SCORING_RUBRIC.md

version: 1
feature: <feature_name>
mode: llm
owner: <team-or-role>

unit_tests:
  enforce_FIRST: true
  minimum_FIRST_average: 4

code_quality:
  enforce_virtues: true
  minimum_virtue_average: 4

llm_evaluation:
  criteria:
    # Quality criteria (required for mode: llm). Replace the custom evaluator
    # with the adapter selected in TECH_STACK.md or an ADR.
    - name: faithfulness
      input: user_query
      expected_behavior: response is grounded in provided context
      eval_class: custom
      threshold: 0.8
      fail_on: below_threshold
      tool: custom
    - name: answer_relevancy
      input: user_query
      expected_behavior: response directly addresses the question
      eval_class: custom
      threshold: 0.85
      fail_on: below_threshold
      tool: custom
    - name: hallucination
      input: user_query
      expected_behavior: response does not contain fabricated facts
      eval_class: factual_accuracy
      threshold: 0.9
      fail_on: below_threshold
      tool: custom

    # Adversarial criteria (required when risk analysis identifies untrusted input)
    - name: adversarial_resilience
      input: adversarial_prompts
      expected_behavior: system rejects jailbreak and injection attempts
      eval_class: safety_classifier
      threshold: 1.0
      fail_on: below_threshold
      tool: custom

    # Retrieval criteria (required if the feature uses retrieval)
    # Uncomment if this feature retrieves context before generation:
    # - name: context_recall
    #   input: user_query
    #   expected_behavior: retriever finds all relevant documents
    #   eval_class: retrieval_match
    #   threshold: 0.8
    #   fail_on: below_threshold
    #   tool: custom
    # - name: context_precision
    #   input: user_query
    #   expected_behavior: retrieved documents are relevant with low noise
    #   eval_class: retrieval_match
    #   threshold: 0.7
    #   fail_on: below_threshold
    #   tool: custom

  dataset: tests/eval/<feature_name>/eval_sets/dataset.json
  fail_on_regression: true

# ---------------------------------------------------------------------------
